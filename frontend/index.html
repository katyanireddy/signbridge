<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge | Bridging Communication</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    fontSize: {
                        'xs': '0.75rem',
                        'sm': '0.875rem',
                        'base': '1rem',
                        'lg': '1.125rem',
                        'xl': '1.25rem',
                        '2xl': '1.5rem',
                        '3xl': '1.875rem',
                        '4xl': '2.25rem',
                        '8xl': '6rem',
                    },
                    colors: {
                        'brand-indigo': '#4F46E5',
                        'brand-purple': '#9333EA',
                        'brand-cyan': '#06b6d4'
                    }
                }
            }
        }
    </script>

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen antialiased selection:bg-brand-purple/30 selection:text-purple-200 pb-12 relative overflow-x-hidden">

    <!-- Ambient Background Glows -->
    <div class="fixed top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-brand-indigo/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-brand-purple/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed top-[40%] left-[50%] translate-x-[-50%] w-[40vw] h-[20vw] rounded-full bg-brand-cyan/10 blur-[100px] pointer-events-none z-0"></div>

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 relative z-10">

        <!-- Header Section -->
        <header class="mb-8 p-6 sm:p-8 rounded-3xl bg-white/5 backdrop-blur-2xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)] flex flex-col items-center justify-center text-center relative overflow-hidden group">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-brand-purple to-transparent opacity-50 group-hover:opacity-100 transition-opacity duration-500"></div>

            <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight flex items-center gap-3 relative z-10 text-transparent bg-clip-text bg-gradient-to-r from-brand-cyan via-brand-indigo to-brand-purple drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
                <iconify-icon icon="solar:hand-stars-linear" stroke-width="1.5" class="text-brand-purple"></iconify-icon>
                SIGNBRIDGE
            </h1>
            <p class="mt-2 text-sm sm:text-base font-medium text-slate-400 tracking-tight relative z-10">Bridging Communication Through Sign Language</p>
        </header>

        <!-- Main Content Grid -->
        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Left Column: Webcam Feed -->
            <section class="bg-white/5 backdrop-blur-xl rounded-3xl overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/10 flex flex-col h-full relative group hover:border-brand-indigo/30 transition-colors duration-500">
                <!-- Camera Header -->
                <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/50 z-10">
                    <h2 class="text-base font-semibold tracking-tight text-slate-200 flex items-center gap-2">
                        <iconify-icon icon="solar:camera-linear" stroke-width="1.5" class="text-brand-cyan text-lg"></iconify-icon>
                        Live Feed
                    </h2>
                    <span id="camera-status" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-white/5 text-slate-400 border border-white/10 transition-colors shadow-sm backdrop-blur-md">
                        <span class="w-2 h-2 rounded-full bg-slate-500 animate-pulse" id="status-dot"></span>
                        Initializing
                    </span>
                </div>

                <!-- Video Container -->
                <div class="relative bg-slate-950 aspect-[4/3] lg:aspect-auto lg:flex-1 w-full flex items-center justify-center overflow-hidden">
                    <video id="webcam" class="absolute inset-0 w-full h-full object-cover transform scale-x-[-1]" autoplay="" playsinline=""></video>
                    <canvas id="output-canvas" class="absolute inset-0 w-full h-full object-cover transform scale-x-[-1] z-10 pointer-events-none"></canvas>

                    <div class="absolute inset-0 shadow-[inset_0_0_40px_rgba(2,6,23,0.8)] pointer-events-none z-10"></div>

                    <!-- Overlay when starting -->
                    <div id="camera-overlay" class="absolute inset-0 flex items-center justify-center bg-slate-950/90 z-20 transition-opacity duration-300 backdrop-blur-md">
                        <div class="flex flex-col items-center gap-3 text-slate-200">
                            <iconify-icon icon="solar:restart-circle-linear" class="animate-spin text-3xl text-brand-purple drop-shadow-[0_0_10px_rgba(147,51,234,0.5)]" stroke-width="1.5"></iconify-icon>
                            <span class="text-sm font-medium tracking-tight">Requesting camera access...</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Column: Output Panel & Controls -->
            <section class="flex flex-col gap-8">

                <!-- Prediction Display Card -->
                <div class="bg-white/5 backdrop-blur-xl rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/10 p-8 flex flex-col items-center justify-center text-center relative overflow-hidden flex-1 min-h-[18rem] group hover:border-brand-purple/30 transition-colors duration-500">
                    <div id="loading-indicator" class="absolute top-5 right-5 text-brand-cyan opacity-0 transition-opacity drop-shadow-[0_0_8px_rgba(6,182,212,0.6)]">
                        <iconify-icon icon="solar:restart-circle-linear" class="animate-spin text-xl" stroke-width="1.5"></iconify-icon>
                    </div>

                    <p class="text-xs font-semibold text-slate-400 mb-4 uppercase tracking-[0.2em]">Live Prediction</p>

                    <div id="prediction-letter" class="text-8xl font-semibold tracking-tighter text-slate-600 bg-white/5 backdrop-blur-md rounded-[2.5rem] w-36 h-36 flex items-center justify-center transition-all duration-300 ring-1 ring-white/10 shadow-inner mb-8">
                        -
                    </div>

                    <!-- Confidence Bar -->
                    <div class="w-full max-w-[18rem] space-y-2.5">
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="text-slate-400">Confidence Match</span>
                            <span id="confidence-text" class="text-slate-500">0%</span>
                        </div>
                        <div class="h-2.5 w-full bg-slate-900/50 rounded-full overflow-hidden shadow-inner border border-white/5">
                            <div id="confidence-bar" class="h-full bg-slate-700 rounded-full w-0 relative">
                                <div class="absolute inset-0 bg-white/20 w-full"></div>
                            </div>
                        </div>
                    </div>

                    <p id="hand-status" class="mt-6 text-sm text-slate-500 font-medium h-5 tracking-tight">No hand detected</p>
                </div>

                <!-- Word Builder Card -->
                <div class="bg-white/5 backdrop-blur-xl rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/10 p-6 flex flex-col gap-5 relative overflow-hidden">
                    <div class="flex justify-between items-center px-1">
                        <h2 class="text-base font-semibold tracking-tight text-slate-200 flex items-center gap-2">
                            <iconify-icon icon="solar:text-field-linear" stroke-width="1.5" class="text-brand-indigo text-lg drop-shadow-[0_0_8px_rgba(79,70,229,0.5)]"></iconify-icon>
                            Word Builder
                        </h2>
                    </div>

                    <!-- Glowing Text Output Area -->
                    <div class="bg-slate-900/50 border border-white/10 shadow-[inset_0_2px_15px_rgba(0,0,0,0.3)] rounded-2xl p-5 min-h-[5rem] flex items-center group relative overflow-hidden transition-all focus-within:ring-2 focus-within:ring-brand-indigo/50 focus-within:border-brand-indigo/50 focus-within:shadow-[0_0_20px_rgba(79,70,229,0.2)]">
                        <span id="built-word" class="text-3xl font-semibold tracking-tight text-white break-all empty:after:content-['Type_or_sign_to_build...'] empty:after:text-slate-600 empty:after:text-base empty:after:font-medium drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]"></span>
                    </div>

                    <!-- Control Buttons -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-1">
                        <button id="btn-add" class="flex items-center justify-center gap-1.5 bg-white/10 hover:bg-white/20 text-white border border-white/10 rounded-xl py-3 px-4 text-sm font-semibold hover:shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:-translate-y-0.5 transition-all active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none backdrop-blur-md">
                            <iconify-icon icon="solar:add-circle-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                            Add
                        </button>
                        <button id="btn-backspace" class="flex items-center justify-center gap-1.5 bg-white/5 hover:bg-orange-500/20 text-orange-400 border border-white/10 hover:border-orange-500/50 rounded-xl py-3 px-4 text-sm font-semibold hover:shadow-[0_0_15px_rgba(249,115,22,0.2)] hover:-translate-y-0.5 transition-all active:scale-[0.98] backdrop-blur-md">
                            <iconify-icon icon="solar:eraser-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                            Del
                        </button>
                        <button id="btn-clear" class="flex items-center justify-center gap-1.5 bg-white/5 hover:bg-rose-500/20 text-rose-400 border border-white/10 hover:border-rose-500/50 rounded-xl py-3 px-4 text-sm font-semibold hover:shadow-[0_0_15px_rgba(244,63,94,0.2)] hover:-translate-y-0.5 transition-all active:scale-[0.98] backdrop-blur-md">
                            <iconify-icon icon="solar:trash-bin-minimalistic-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                            Clear
                        </button>
                        <button id="btn-speak" disabled="" class="flex items-center justify-center gap-1.5 bg-gradient-to-r from-brand-indigo to-brand-purple text-white rounded-xl py-3 px-4 text-sm font-semibold hover:shadow-[0_0_20px_rgba(147,51,234,0.5)] border border-white/10 hover:-translate-y-0.5 transition-all active:scale-[0.98] disabled:opacity-50 disabled:hover:transform-none disabled:hover:shadow-none cursor-pointer disabled:cursor-not-allowed">
                            <iconify-icon icon="solar:volume-up-linear" class="text-lg" stroke-width="1.5"></iconify-icon>
                            Speak
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Section: Session History -->
        <section class="mt-8">
            <div class="bg-white/5 backdrop-blur-xl rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/10 overflow-hidden relative">
                <div class="p-5 border-b border-white/10 bg-slate-900/30 flex justify-between items-center z-10 relative">
                    <h2 class="text-base font-semibold tracking-tight text-slate-200 flex items-center gap-2">
                        <iconify-icon icon="solar:history-linear" stroke-width="1.5" class="text-slate-400 text-lg"></iconify-icon>
                        Session History
                    </h2>
                    <span class="text-xs text-brand-cyan font-semibold bg-brand-cyan/10 border border-brand-cyan/20 px-3 py-1 rounded-full drop-shadow-[0_0_5px_rgba(6,182,212,0.3)]">Last 10 records</span>
                </div>

                <div class="p-5 relative z-10">
                    <div id="history-body" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>

                    <div id="history-empty" class="py-10 flex flex-col items-center justify-center text-slate-500 gap-3">
                        <div class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 mb-2 shadow-inner">
                            <iconify-icon icon="solar:ghost-linear" class="text-2xl" stroke-width="1.5"></iconify-icon>
                        </div>
                        <p class="text-sm font-medium tracking-tight">No predictions recorded yet</p>
                    </div>
                </div>
            </div>
            
        </section>

    </div>
    <video id="webcam" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<h2 id="prediction-letter"></h2>
<h3 id="confidence-text"></h3>

    <!-- Application Logic -->
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</body>
</html>
